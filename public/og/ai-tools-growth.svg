    <text x="92" y="174" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#0F172A">Automation</text>
    <rect y="240" width="300" height="94" rx="24" fill="#fff"/>
    <rect x="28" y="265" width="44" height="44" rx="14" fill="#8B5CF6"/>
