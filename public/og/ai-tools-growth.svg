    <text x="29" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#fff">D</text>
    <text x="78" y="39" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0F172A">DeepLinkOS</text>
  </g>
  <text x="88" y="235" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" letter-spacing="-4" fill="#0F172A">AI Tools for</text>
  <text x="88" y="326" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" letter-spacing="-4" fill="#0F172A">Growth</text>
  <g transform="translate(780 148)" filter="url(#shadow)">
