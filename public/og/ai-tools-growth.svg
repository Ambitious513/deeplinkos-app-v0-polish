  <text x="88" y="438" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#334155">Curated tools, alternatives, and workflows</text>
  <text x="88" y="486" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#334155">for creators, stores, marketers, and agencies.</text>
