  <text x="124" y="438" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#64748B">Paste any URL. Generate a smart route.</text>
  <rect x="600" y="405" width="138" height="46" rx="14" fill="url(#accent)"/>
  <text x="669" y="435" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#fff">Generate</text>
  <text x="88" y="532" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#334155">Smart links for apps, QR codes, social bios, email, and campaigns.</text>
