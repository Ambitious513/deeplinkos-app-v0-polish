<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Free DeepLink Generator by DeepLinkOS</title>
  <desc id="desc">Open graph preview image for the DeepLinkOS free deep link generator.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DEE9FE"/>
      <stop offset="1" stop-color="#C7D8FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#1E3A8A" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="130" r="90" fill="#EAF2FF" opacity=".75"/>
  <circle cx="1040" cy="420" r="150" fill="#BFEFFF" opacity=".4"/>
  <g transform="translate(88 92)">
    <rect width="58" height="58" rx="16" fill="url(#accent)" filter="url(#shadow)"/>
    <text x="29" y="38" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#fff">D</text>
    <text x="78" y="39" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="#0F172A">DeepLinkOS</text>
  </g>
  <text x="88" y="235" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" letter-spacing="-4" fill="#0F172A">Free DeepLink</text>
  <text x="88" y="326" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" letter-spacing="-4" fill="#0F172A">Generator</text>
